<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'">
  <title>DeepSeek Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="drag-overlay"><div class="drag-hint"><span class="drag-icon">📂</span><p>释放文件以添加为上下文</p></div></div>
<div id="context-menu"></div>

<!-- 左侧边栏 -->
<aside id="sidebar">
  <div id="sidebar-header"><span class="logo">🤖 DeepSeek</span></div>
  <div id="sidebar-search-wrap"><input type="text" id="session-search" placeholder="🔍 搜索会话..."></div>
  <div id="session-list"></div>
  <div id="sidebar-footer">
    <button id="btn-new-chat">＋</button>
    <button id="btn-workspace-toggle" class="active" title="切换工作区面板">🖥️</button>
    <button id="btn-settings">⚙</button>
  </div>
</aside>

<!-- 中间聊天区 -->
<div id="main">
  <div id="chat-header">
    <span id="chat-title">DeepSeek Chat</span>
    <span id="chat-model-badge" class="model-badge"></span>
    <div id="header-actions">
      <button id="btn-dark-header" title="深色模式 (Ctrl+Shift+D)">🌙</button>
      <button id="btn-search-toggle" title="搜索对话 (Ctrl+Shift+F)">🔍</button>
      <button id="btn-lang-toggle" title="切换语言 / Switch Language">中/EN</button>
      <button id="btn-export" title="导出对话 (Ctrl+Shift+E)" style="display:none">📥 导出</button>
    </div>
  </div>
  <div id="search-bar" style="display:none">
    <input type="text" id="search-input" placeholder="搜索对话内容...">
    <span id="search-count"></span>
    <button id="btn-search-prev">▲</button><button id="btn-search-next">▼</button><button id="btn-search-close">✕</button>
  </div>
  <div id="chat-messages"><div id="welcome-screen" class="welcome"></div></div>
  <div id="attach-bar" style="display:none"></div>
  <div id="chat-input-area">
    <button id="btn-attach" title="添加文件">📎</button>
    <button id="btn-tool-mode" title="工具模式：AI可创建文件/执行命令">🔧</button>
    <textarea id="chat-input" placeholder="输入消息... (Enter 发送)" rows="1"></textarea>
    <button id="btn-send" disabled>发送</button>
    <button id="btn-stop" style="display:none">⏹</button>
  </div>
  <button id="scroll-bottom-btn"><span>↓</span><span id="scroll-badge" style="display:none">0</span></button>
</div>

<!-- 右侧工作区面板 -->
<aside id="workspace-panel">
  <div class="ws-tabs">
    <button class="ws-tab active" data-tab="files">📁 文件</button>
    <button class="ws-tab" data-tab="git">🔀 Git</button>
    <button class="ws-tab" data-tab="clone">📥 Clone</button>
    <button class="ws-tab" data-tab="tasks">📋 任务</button>
    <button class="ws-tab" data-tab="tools">⚡ 工具</button>
  </div>

  <div class="ws-content active" id="ws-files">
    <div class="ws-topbar">
      <button id="ws-pick-project" class="btn-xs">📂 打开项目</button>
      <button id="ws-open-full" class="btn-xs" title="打开独立工作台窗口">⬛</button>
    </div>
    <input type="text" id="ws-file-filter" class="ws-filter" placeholder="过滤文件...">
    <div id="ws-recent-projects" class="ws-section"></div>
    <div id="ws-file-tree"><div class="empty-hint">打开项目目录以浏览文件</div></div>
  </div>

  <div class="ws-content" id="ws-git">
    <div class="ws-git-branch" id="ws-git-branch"></div>
    <div class="ws-git-actions">
      <input type="text" id="ws-git-msg" class="ws-filter" placeholder="commit 信息..." style="flex:1">
      <button id="ws-git-commit" class="btn-xs" title="git add . && git commit">✅ 提交</button>
      <button id="ws-git-push" class="btn-xs" title="git push">📤</button>
      <button id="ws-git-pull" class="btn-xs" title="git pull">📥</button>
    </div>
    <div id="ws-git-changes"></div>
    <div id="ws-git-log"></div>
  </div>

  <div class="ws-content" id="ws-clone">
    <div class="ws-topbar"><span style="font-size:11px;font-weight:600">📥 克隆仓库</span></div>
    <input type="text" id="ws-clone-url" class="ws-filter" placeholder="https://github.com/user/repo.git">
    <button id="ws-clone-btn" class="btn-xs" style="width:100%;margin-top:4px">⬇ 克隆到项目目录</button>
  </div>

  <div class="ws-content" id="ws-tasks">
    <div class="ws-topbar">
      <button id="ws-add-task" class="btn-xs">＋ 新建</button>
      <button id="ws-batch-delete" class="btn-xs btn-xs-danger">🗑 批量删</button>
      <select id="ws-task-filter" class="btn-xs" style="width:70px">
        <option value="all">全部</option><option value="pending">待处理</option><option value="in_progress">进行中</option><option value="done">已完成</option>
      </select>
    </div>
    <div id="ws-task-list"></div>
    <div id="ws-pipeline-mini">
      <span class="pipe-dot" data-stage="code">💻</span>→<span class="pipe-dot" data-stage="review">🔍</span>→<span class="pipe-dot" data-stage="score">📊</span>
    </div>
  </div>

  <div class="ws-content" id="ws-tools">
    <div class="ws-section-title">⚡ 快速操作</div>
    <div id="ws-quick-actions">
      <button class="btn-agent" data-role="coder">🧑‍💻 编码</button>
      <button class="btn-agent" data-role="reviewer">🔍 审查</button>
      <button class="btn-agent" data-role="scorer">📊 评分</button>
      <button class="btn-agent" data-role="architect">🏗️ 架构</button>
    </div>
    <button id="ws-open-terminal" class="btn-agent">⬛ 打开终端</button>

    <div class="ws-section-title" style="margin-top:10px">📋 指令模板</div>
    <div id="ws-templates"></div>

    <div class="ws-section-title" style="margin-top:10px">💾 快照</div>
    <div id="ws-snapshots"></div>
    <button id="ws-create-snapshot" class="btn-xs" style="width:100%;margin-top:4px">📸 保存当前状态</button>

    <div class="ws-section-title" style="margin-top:10px">🕐 操作记录</div>
    <div id="ws-action-history"></div>

    <div class="ws-section-title" style="margin-top:10px">🤖 活跃代理</div>
    <div id="ws-agents"></div>
  </div>
</aside>

<!-- 设置 -->
<div id="settings-overlay" class="overlay hidden">
  <div class="panel settings-panel">
    <div class="panel-header"><h3>⚙ 设置</h3><button id="btn-close-settings">✕</button></div>
    <div class="panel-body">
      <label>API Key <span class="required">*</span></label><input type="password" id="cfg-api-key" placeholder="sk-...">
      <label>API Base URL</label><input type="text" id="cfg-api-base" placeholder="https://api.deepseek.com">
      <label>模型</label><select id="cfg-model"><option value="deepseek-chat">deepseek-chat</option><option value="deepseek-reasoner">deepseek-reasoner</option></select>
      <label>系统提示词</label><textarea id="cfg-system-prompt" rows="3"></textarea>
      <label>Temperature: <span id="temp-label">0.7</span></label><input type="range" id="cfg-temperature" min="0" max="2" step="0.1" value="0.7">

    </div>
    <div class="panel-footer"><button id="btn-save-settings" class="btn-primary">保存</button></div>
  </div>
</div>

<!-- 新建任务弹窗 -->
<div id="task-modal" class="modal hidden">
  <div class="modal-content">
    <h3>新建任务</h3>
    <input type="text" id="task-title" placeholder="任务标题">
    <textarea id="task-desc" placeholder="描述" rows="3"></textarea>
    <input type="text" id="task-tags-input" placeholder="标签 (逗号分隔)">
    <div class="modal-actions"><button id="btn-task-cancel">取消</button><button id="btn-task-create" class="btn-primary">创建</button></div>
  </div>
</div>

<script src="i18n.js"></script>
<script src="renderer.js"></script>
</body>
</html>
