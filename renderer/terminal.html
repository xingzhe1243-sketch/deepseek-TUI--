<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'">
  <title>终端</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#1e1e1e;color:#d4d4d4;font-family:"Consolas","Courier New",monospace;height:100vh;overflow:hidden;display:flex;flex-direction:column}
    #term-header{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:#2d2d2d;border-bottom:1px solid #3c3c3c;flex-shrink:0}
    #term-title{font-size:12px;color:#888}
    #term-header button{padding:4px 12px;border:1px solid #555;border-radius:4px;background:#3c3c3c;color:#ccc;cursor:pointer;font-size:11px}
    #term-header button:hover{background:#4a4a4a}
    #term-output{flex:1;overflow-y:auto;padding:8px 12px;white-space:pre-wrap;word-break:break-all;font-size:13px;line-height:1.4}
    #term-input-area{display:flex;border-top:1px solid #3c3c3c;flex-shrink:0}
    #term-prompt{color:#07c160;padding:8px 0 8px 12px;font-size:13px;user-select:none;flex-shrink:0}
    #term-input{flex:1;background:transparent;border:none;color:#d4d4d4;font-family:inherit;font-size:13px;padding:8px 0;outline:none}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#555;border-radius:3px}
    .term-cmd{color:#569cd6}
    .term-err{color:#f44747}
    .term-info{color:#6a9955}
  </style>
</head>
<body>
  <div id="term-header">
    <span id="term-title">终端 — DeepSeek 工作台</span>
    <div>
      <button id="btn-new-term">＋ 新建</button>
      <button id="btn-clear-term">清屏</button>
    </div>
  </div>
  <div id="term-output"></div>
  <div id="term-input-area">
    <span id="term-prompt">&gt;</span>
    <input type="text" id="term-input" placeholder="输入命令..." spellcheck="false" autofocus>
  </div>
  <script>
    const api = window.electronAPI;
    const $ = s => document.querySelector(s);
    let termId = null;
    let cmdHistory = [];
    let historyIdx = -1;
    let currentInput = '';

    async function init() {
      termId = await api.termCreate();
      $('#term-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { const cmd = e.target.value; cmdHistory.push(cmd); historyIdx = cmdHistory.length; appendOutput(`\n${cmd}`, 'term-cmd'); api.termWrite(termId, cmd + '\r\n'); e.target.value = ''; }
        else if (e.key === 'ArrowUp') { e.preventDefault(); if (historyIdx > 0) { historyIdx--; e.target.value = cmdHistory[historyIdx]; } }
        else if (e.key === 'ArrowDown') { e.preventDefault(); if (historyIdx < cmdHistory.length - 1) { historyIdx++; e.target.value = cmdHistory[historyIdx]; } else { historyIdx = cmdHistory.length; e.target.value = ''; } }
      });
      api.onTermData(d => { if (d.id === termId) appendOutput(d.data); });
      api.onTermClosed(id => { if (id === termId) appendOutput('\n[终端已关闭]', 'term-err'); });
      $('#btn-new-term').addEventListener('click', async () => { termId = await api.termCreate(); clearOutput(); });
      $('#btn-clear-term').addEventListener('click', clearOutput);
      appendOutput('DeepSeek 终端已就绪。输入命令开始...\n', 'term-info');
    }

    function appendOutput(text, cls) {
      const el = $('#term-output');
      const span = document.createElement('span');
      if (cls) span.className = cls;
      span.textContent = text;
      el.appendChild(span);
      el.scrollTop = el.scrollHeight;
    }

    function clearOutput() { $('#term-output').innerHTML = ''; }

    init();
  </script>
</body>
</html>
